<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GESTIA-IA - Modelo de Gestión Estratégica Universitaria</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #040d1a;
      --bg-panel: #071428;
      --bg-card: #0a1d3a;
      --bg-input: #0d2347;
      --accent-blue: #1e7fd4;
      --accent-cyan: #00c8ff;
      --accent-gold: #d4a21e;
      --text-primary: #e8f4ff;
      --text-secondary: #7fb3d3;
      --text-muted: #3d6080;
      --border: #1a3a5c;
      --success: #22c55e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #040d1a 0%, #071428 50%, #040d1a 100%);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: relative;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 18px;
      color: var(--accent-cyan);
    }

    .logo-icon {
      font-size: 24px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-name {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .auth-button {
      background: var(--accent-blue);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    /* SIDEBAR */
    .sidebar {
      width: 280px;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      padding: 16px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .new-chat-btn {
      background: var(--accent-blue);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      width: 100%;
    }

    .conversations-list {
      flex: 1;
      overflow-y: auto;
    }

    .conversation-item {
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.2s;
    }

    .conversation-item:hover {
      background: var(--bg-card);
    }

    .conversation-item.active {
      background: var(--accent-blue);
    }

    .conversation-title {
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conversation-date {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* SEARCH BAR */
    .search-bar {
      padding: 12px;
      margin-bottom: 16px;
    }

    .search-input {
      width: 100%;
      padding: 10px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 14px;
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    /* MAIN CONTENT */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* CHAT AREA */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      position: relative;
      word-wrap: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: var(--accent-blue);
      color: white;
      border-top-right-radius: 0;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--bg-card);
      border-top-left-radius: 0;
    }

    .message-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      display: flex;
      justify-content: flex-end;
    }

    .message-files {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .file-item {
      background: var(--bg-input);
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .file-item:hover {
      background: var(--border);
    }

    /* INPUT AREA */
    .input-area {
      padding: 16px;
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .file-upload-zone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .file-upload-zone.drag-over {
      border-color: var(--accent-cyan);
    }

    .file-upload-zone p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .files-list {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .file-preview {
      background: var(--bg-input);
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .file-remove {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
    }

    .input-container {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .user-input {
      flex: 1;
      padding: 12px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      resize: none;
      max-height: 120px;
      overflow-y: auto;
    }

    .user-input::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      background: var(--accent-blue);
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .send-btn:disabled {
      background: var(--text-muted);
      cursor: not-allowed;
    }

    .status-text {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
    }

    /* WELCOME MESSAGE */
    .welcome-message {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }

    .welcome-message h1 {
      font-size: 24px;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .welcome-message p {
      font-size: 14px;
      max-width: 400px;
      margin: 0 auto;
    }

    /* LOADING INDICATOR */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 8px 0;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    /* SCROLLBAR */
    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <span class="logo-icon">🤖</span>
      <span>GESTIA-IA</span>
    </div>
    <div class="user-info">
      <span class="user-name" id="userName">Invitado</span>
      <button class="auth-button" id="authButton" onclick="toggleAuth()">Iniciar Sesión</button>
    </div>
  </header>

  <div style="display: flex; flex: 1; overflow: hidden;">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <button class="new-chat-btn" onclick="newConversation()">Nueva Conversación</button>
      <div class="search-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="Buscar en el historial..." onkeyup="searchConversations(event)">
      </div>
      <div class="conversations-list" id="conversationsList">
        <div style="font-size:12px; color:var(--text-muted); text-align:center; padding: 8px 0;">No hay conversaciones</div>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <div class="chat-area">
        <div class="chat-messages" id="chatMessages">
          <div class="welcome-message" id="welcomeMessage">
            <h1>Bienvenido a GESTIA-IA</h1>
            <p>Soy tu asistente de gestión estratégica universitaria. ¿En qué puedo ayudarte hoy?</p>
          </div>
        </div>
        <div class="input-area">
          <div class="file-upload-zone" id="uploadZone" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
            <p>Arrastra archivos aquí o haz clic para subir (PDF, TXT, DOCX, XLSX, etc.)</p>
            <input type="file" id="fileInput" multiple accept=".pdf,.txt,.docx,.doc,.xlsx,.csv,.md,.json,.pptx" style="display: none;" onchange="handleFiles(this.files)">
          </div>
          <div class="files-list" id="filesList"></div>
          <div class="input-container">
            <textarea class="user-input" id="userInput" placeholder="Escribe tu mensaje aquí..." rows="1" onkeydown="handleInputKeyDown(event)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Enviar">▶</button>
          </div>
          <div class="status-text" id="statusText">GESTIA-IA activo</div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal de Autenticación -->
  <div id="authModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;">
    <div style="background: var(--bg-panel); padding: 24px; border-radius: 8px; width: 300px; max-width: 90%;">
      <h2 style="margin-bottom: 16px; color: var(--text-primary);">Iniciar Sesión</h2>
      <div style="margin-bottom: 16px;">
        <label style="display: block; margin-bottom: 4px; color: var(--text-secondary);">Nombre:</label>
        <input type="text" id="loginName" style="width: 100%; padding: 8px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 4px; color: var(--text-primary);">
      </div>
      <div style="margin-bottom: 20px;">
        <label style="display: block; margin-bottom: 4px; color: var(--text-secondary);">Token de API:</label>
        <input type="password" id="loginToken" style="width: 100%; padding: 8px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 4px; color: var(--text-primary);">
      </div>
      <button onclick="login()" style="width: 100%; padding: 10px; background: var(--accent-blue); color: white; border: none; border-radius: 4px; cursor: pointer;">Ingresar</button>
      <button onclick="closeAuthModal()" style="margin-top: 8px; width: 100%; padding: 10px; background: transparent; color: var(--text-secondary); border: 1px solid var(--border); border-radius: 4px; cursor: pointer;">Cancelar</button>
    </div>
  </div>

  <script>
    // =============================================
    // Configuración
    // =============================================
    const API_URL = 'https://gestia-ia-api-production.up.railway.app/api'; // Cambiar por la URL de tu API desplegada
    let currentUser = null;
    let currentConversationId = null;
    let conversationHistory = [];
    let uploadedFiles = [];
    let fileContents = {};
    let isLoading = false;

    // =============================================
    // Autenticación
    // =============================================
    function toggleAuth() {
      const modal = document.getElementById('authModal');
      modal.style.display = modal.style.display === 'none' ? 'flex' : 'none';
    }

    function closeAuthModal() {
      document.getElementById('authModal').style.display = 'none';
    }

    function login() {
      const name = document.getElementById('loginName').value.trim();
      const token = document.getElementById('loginToken').value.trim();

      if (!name || !token) {
        alert('Por favor, ingresa tu nombre y token de API.');
        return;
      }

      currentUser = { name, token };
      document.getElementById('userName').textContent = name;
      document.getElementById('authButton').textContent = 'Cerrar Sesión';
      document.getElementById('authButton').onclick = logout;
      closeAuthModal();
      loadConversations();
    }

    function logout() {
      currentUser = null;
      document.getElementById('userName').textContent = 'Invitado';
      document.getElementById('authButton').textContent = 'Iniciar Sesión';
      document.getElementById('authButton').onclick = toggleAuth;
      currentConversationId = null;
      conversationHistory = [];
      uploadedFiles = [];
      fileContents = {};
      renderConversationsList();
      renderChatMessages();
    }

    // =============================================
    // Conversaciones
    // =============================================
    async function loadConversations() {
      if (!currentUser) return;

      try {
        const response = await fetch(`${API_URL}/conversations/${currentUser.name}`, {
          headers: {
            'Authorization': `Bearer ${currentUser.token}`
          }
        });
        const conversations = await response.json();
        renderConversationsList(conversations);
      } catch (err) {
        console.error('Error al cargar conversaciones:', err);
      }
    }

    async function newConversation() {
      if (!currentUser) {
        toggleAuth();
        return;
      }

      try {
        const response = await fetch(`${API_URL}/conversations`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${currentUser.token}`
          },
          body: JSON.stringify({
            userId: currentUser.name,
            title: `Conversación ${new Date().toLocaleDateString()}`
          })
        });
        const conversation = await response.json();
        currentConversationId = conversation.id;
        conversationHistory = [];
        uploadedFiles = [];
        fileContents = {};
        renderConversationsList();
        renderChatMessages();
        document.getElementById('welcomeMessage').style.display = 'none';
      } catch (err) {
        console.error('Error al crear conversación:', err);
      }
    }

    function renderConversationsList(conversations = []) {
      const list = document.getElementById('conversationsList');
      if (conversations.length === 0) {
        list.innerHTML = '<div style="font-size:12px; color:var(--text-muted); text-align:center; padding: 8px 0;">No hay conversaciones</div>';
        return;
      }

      list.innerHTML = conversations.map(conversation => `
        <div class="conversation-item ${conversation.id === currentConversationId ? 'active' : ''}"
             onclick="loadConversation(${conversation.id})">
          <div>
            <div class="conversation-title">${escapeHtml(conversation.title)}</div>
            <div class="conversation-date">${new Date(conversation.created_at).toLocaleDateString()}</div>
          </div>
        </div>
      `).join('');
    }

    async function loadConversation(conversationId) {
      if (!currentUser) {
        toggleAuth();
        return;
      }

      currentConversationId = conversationId;
      try {
        const response = await fetch(`${API_URL}/conversations/${conversationId}/messages`, {
          headers: {
            'Authorization': `Bearer ${currentUser.token}`
          }
        });
        const messages = await response.json();
        conversationHistory = messages.map(m => ({
          role: m.role,
          content: m.content,
          files: m.files || []
        }));
        renderConversationsList();
        renderChatMessages();
        document.getElementById('welcomeMessage').style.display = 'none';
      } catch (err) {
        console.error('Error al cargar conversación:', err);
      }
    }

    // =============================================
    // Mensajes y Archivos
    // =============================================
    function handleDragOver(e) {
      e.preventDefault();
      document.getElementById('uploadZone').classList.add('drag-over');
    }

    function handleDragLeave() {
      document.getElementById('uploadZone').classList.remove('drag-over');
    }

    function handleDrop(e) {
      e.preventDefault();
      document.getElementById('uploadZone').classList.remove('drag-over');
      handleFiles(e.dataTransfer.files);
    }

    function handleFiles(files) {
      Array.from(files).forEach(file => {
        if (uploadedFiles.find(f => f.name === file.name)) return;
        uploadedFiles.push(file);
        readFileContent(file);
        renderFilesList();
      });
    }

    function readFileContent(file) {
      const reader = new FileReader();
      reader.onload = e => {
        fileContents[file.name] = e.target.result;
      };
      if (file.type === 'application/pdf') {
        fileContents[file.name] = `[Archivo PDF: ${file.name}. Tamaño: ${(file.size/1024).toFixed(1)}KB.]`;
      } else {
        reader.readAsText(file);
      }
    }

    function renderFilesList() {
      const list = document.getElementById('filesList');
      if (uploadedFiles.length === 0) {
        list.innerHTML = '';
        return;
      }
      list.innerHTML = uploadedFiles.map((f, i) => `
        <div class="file-preview">
          <span>${getFileIcon(f.name)}</span>
          <span>${escapeHtml(f.name)}</span>
          <button class="file-remove" onclick="removeFile(${i})" title="Eliminar">✕</button>
        </div>
      `).join('');
    }

    function removeFile(idx) {
      const name = uploadedFiles[idx].name;
      delete fileContents[name];
      uploadedFiles.splice(idx, 1);
      renderFilesList();
    }

    function getFileIcon(name) {
      const ext = name.split('.').pop().toLowerCase();
      const icons = {
        pdf: '📄', txt: '📝', docx: '📃', doc: '📃',
        xlsx: '📊', csv: '📊', pptx: '📋', json: '🔧', md: '📝'
      };
      return icons[ext] || '📁';
    }

    function handleInputKeyDown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    async function sendMessage() {
      if (isLoading || !currentUser) {
        if (!currentUser) toggleAuth();
        return;
      }

      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;

      // Deshabilitar inputs mientras se procesa
      input.value = '';
      input.style.height = 'auto';
      isLoading = true;
      document.getElementById('sendBtn').disabled = true;
      document.getElementById('statusText').textContent = 'GESTIA-IA procesando...';

      // Agregar mensaje del usuario al chat
      appendMessage('user', text, uploadedFiles.map(f => f.name));

      // Crear conversación si no hay una activa
      if (!currentConversationId) {
        await newConversation();
      }

      // Preparar datos para enviar a la API
      const formData = new FormData();
      formData.append('conversationId', currentConversationId);
      formData.append('role', 'user');
      formData.append('content', text);

      // Agregar archivos
      uploadedFiles.forEach(file => {
        formData.append('files', file);
      });

      try {
        const response = await fetch(`${API_URL}/messages`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${currentUser.token}`
          },
          body: formData
        });

        const data = await response.json();
        // Agregar respuesta de la IA al chat
        appendMessage('assistant', data.aiResponse, [], data.files);

        // Actualizar historial
        conversationHistory.push({ role: 'user', content: text, files: uploadedFiles.map(f => f.name) });
        conversationHistory.push({ role: 'assistant', content: data.aiResponse, files: data.files });

        // Limpiar archivos
        uploadedFiles = [];
        fileContents = {};
        renderFilesList();
      } catch (err) {
        appendMessage('assistant', 'Error de conexión con GESTIA-IA. Verifica tu conexión e intenta nuevamente.');
        console.error('Error al enviar mensaje:', err);
      }

      isLoading = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('statusText').textContent = 'GESTIA-IA activo';
      document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
    }

    function appendMessage(role, content, files = [], aiFiles = []) {
      const messagesContainer = document.getElementById('chatMessages');
      const welcomeMessage = document.getElementById('welcomeMessage');

      if (welcomeMessage.style.display !== 'none') {
        welcomeMessage.style.display = 'none';
      }

      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}`;

      const contentDiv = document.createElement('div');
      contentDiv.innerHTML = escapeHtml(content).replace(/\n/g, '<br>');

      const timeDiv = document.createElement('div');
      timeDiv.className = 'message-time';
      timeDiv.textContent = getTime();

      messageDiv.appendChild(contentDiv);
      messageDiv.appendChild(timeDiv);

      // Agregar archivos (si los hay)
      if (files.length > 0 || aiFiles.length > 0) {
        const filesDiv = document.createElement('div');
        filesDiv.className = 'message-files';

        [...files, ...aiFiles].forEach(file => {
          const fileItem = document.createElement('div');
          fileItem.className = 'file-item';
          fileItem.innerHTML = `${getFileIcon(file.name || file.file_name)} ${escapeHtml(file.name || file.file_name)}`;
          if (file.url) {
            fileItem.onclick = () => window.open(file.url, '_blank');
            fileItem.style.cursor = 'pointer';
          }
          filesDiv.appendChild(fileItem);
        });

        messageDiv.appendChild(filesDiv);
      }

      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function renderChatMessages() {
      const messagesContainer = document.getElementById('chatMessages');
      messagesContainer.innerHTML = '';

      if (conversationHistory.length === 0) {
        document.getElementById('welcomeMessage').style.display = 'block';
        return;
      }

      conversationHistory.forEach(msg => {
        appendMessage(msg.role, msg.content, [], msg.files);
      });
    }

    // =============================================
    // Búsqueda
    // =============================================
    async function searchConversations(e) {
      if (e.key !== 'Enter' || !currentUser) return;

      const query = e.target.value.trim();
      if (!query) return;

      try {
        const response = await fetch(`${API_URL}/search?query=${encodeURIComponent(query)}`, {
          headers: {
            'Authorization': `Bearer ${currentUser.token}`
          }
        });
        const results = await response.json();
        if (results.length === 0) {
          alert('No se encontraron resultados.');
          return;
        }

        // Mostrar resultados en una nueva pestaña o modal (simplificado)
        alert(`Se encontraron ${results.length} resultados. Revisa la consola para detalles.`);
        console.log('Resultados de búsqueda:', results);
      } catch (err) {
        console.error('Error al buscar:', err);
      }
    }

    // =============================================
    // Utilidades
    // =============================================
    function getTime() {
      return new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // =============================================
    // Inicialización
    // =============================================
    document.getElementById('uploadZone').addEventListener('click', () => {
      document.getElementById('fileInput').click();
    });

    document.getElementById('fileInput').addEventListener('change', (e) => {
      handleFiles(e.target.files);
      e.target.value = ''; // Limpiar input para permitir subir el mismo archivo otra vez
    });

    // Cargar conversaciones si hay usuario autenticado
    if (currentUser) {
      loadConversations();
    }
  </script>
</body>
</html>
